name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Path filter to detect workflow-related file changes
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      workflow-files: ${{ steps.filter.outputs.workflow-files }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow-files:
              - 'src/components/workflow/**'
              - 'src/utils/layoutGraph*'
              - 'src/hooks/useWorkflow*'
              - 'e2e/tests/workflow*'
              - 'e2e/tests/workflows/**'
              - 'e2e/helpers/workflow*'
              - 'e2e/helpers/auto-approve*'
              - 'e2e/helpers/sse-parser*'
              - 'e2e/fixtures/api*'

  workflow-e2e:
    name: Workflow E2E Tests
    needs: [changes, build]
    if: ${{ needs.changes.outputs.workflow-files == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run workflow E2E tests (mock only)
        run: npx playwright test e2e/tests/workflows/mock-execution.spec.ts --reporter=line
        env:
          API_URL: ${{ vars.API_URL || 'http://localhost:8080' }}

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts="--all" -v
