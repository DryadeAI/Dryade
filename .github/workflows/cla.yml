# =============================================================================
# CLA Assistant -- Contributor License Agreement
# =============================================================================
# Automated CLA check for pull requests. Contributors sign by commenting
# "I have read the CLA Document and I hereby sign the CLA" on their first PR.
# Signed agreements are tracked in a JSON file on the main branch.
#
# Security review: github.event.comment.body is used ONLY in the `if:`
# condition (not in a `run:` block), which is safe from command injection.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: "CLA.md"
          branch: "main"
          allowlist: "dependabot[bot],github-actions[bot]"
