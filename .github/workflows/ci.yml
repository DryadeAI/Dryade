name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff==0.14.13

      - name: Ruff check
        run: ruff check dryade-core/core/

      - name: Ruff format check
        run: ruff format --check dryade-core/core/ || echo "::warning::Ruff format check found differences (non-blocking)"

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts="--all" -v

  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dryade_test
          POSTGRES_USER: dryade
          POSTGRES_PASSWORD: dryade_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dryade -d dryade_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DRYADE_DATABASE_URL: "postgresql+psycopg://dryade:dryade_dev@localhost:5432/dryade_test"
      DRYADE_TEST_DATABASE_URL: "postgresql+psycopg://dryade:dryade_dev@localhost:5432/dryade_test"
      DRYADE_JWT_SECRET: "ci-unit-test-secret-at-least-32-chars-long"
      DRYADE_AUTH_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --extra dev
          pip install argon2-cffi>=21.3.0 deepeval>=1.0.0

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          PYTHONPATH=.:dryade-core pytest tests/unit/ -v -m "not e2e" \
            --ignore=tests/eval \
            --ignore=tests/unit/plugins \
            --ignore=tests/unit/test_zitadel_plugin.py \
            --ignore=tests/unit/test_exception_handling.py \
            --ignore=tests/unit/workflows/test_checkpointed_executor.py \
            --ignore=tests/unit/test_zitadel_plugin.py \
            --cov --cov-config=pyproject.toml \
            --cov-report=xml --cov-report=term-missing \
            --timeout=120

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dryade_test
          POSTGRES_USER: dryade
          POSTGRES_PASSWORD: dryade_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dryade -d dryade_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DRYADE_DATABASE_URL: "postgresql+psycopg://dryade:dryade_dev@localhost:5432/dryade_test"
      DRYADE_TEST_DATABASE_URL: "postgresql+psycopg://dryade:dryade_dev@localhost:5432/dryade_test"
      DRYADE_JWT_SECRET: "ci-integration-test-secret-at-least-32-chars"
      DRYADE_AUTH_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --extra dev
          pip install argon2-cffi>=21.3.0 deepeval>=1.0.0

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          PYTHONPATH=.:dryade-core pytest tests/integration/ -v -m "not e2e" \
            --ignore=tests/integration/workflows \
            --ignore=tests/integration/test_autonomous_mode.py \
            --ignore=tests/eval \
            --ignore=tests/unit/plugins \
            --ignore=tests/unit/test_zitadel_plugin.py \
            --ignore=tests/unit/test_exception_handling.py \
            --ignore=tests/unit/workflows/test_checkpointed_executor.py \
            --cov --cov-config=pyproject.toml \
            --cov-report=xml --cov-report=term-missing \
            --timeout=120

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  eval-tests:
    name: LLM Quality Eval
    needs: unit-tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --extra dev

      - name: Run eval tests (deterministic only)
        env:
          DEEPEVAL_TELEMETRY_OPT_OUT: "true"
        run: |
          source .venv/bin/activate
          PYTHONPATH=.:dryade-core pytest tests/eval/ -v -m "not geval" --timeout=120 --tb=short

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: tests/eval/.results/
          retention-days: 14

  e2e-backend:
    name: Backend E2E
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    env:
      DRYADE_AUTH_ENABLED: "false"
      DRYADE_REDIS_ENABLED: "false"
      DRYADE_RATE_LIMIT_ENABLED: "false"
      DRYADE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --extra dev
          pip install argon2-cffi>=21.3.0

      - name: Run backend E2E tests
        run: |
          source .venv/bin/activate
          PYTHONPATH=.:dryade-core pytest tests/e2e/ -m e2e -v --tb=short -x --timeout=300

  e2e-frontend:
    name: Frontend E2E
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    env:
      DRYADE_AUTH_ENABLED: "true"
      DRYADE_JWT_SECRET: "e2e-test-secret-key-at-least-32-characters-long"
      DRYADE_REDIS_ENABLED: "false"
      DRYADE_RATE_LIMIT_ENABLED: "false"
      DRYADE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --extra dev
          pip install argon2-cffi>=21.3.0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dryade-workbench/package-lock.json

      - name: Install frontend dependencies
        working-directory: dryade-workbench
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dryade-workbench
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          source .venv/bin/activate
          PYTHONPATH=.:dryade-core python -m uvicorn core.api.main:app --host 0.0.0.0 --port 8080 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health && break
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          curl -f http://localhost:8080/api/health || exit 1

      - name: Build and serve frontend
        working-directory: dryade-workbench
        run: |
          npm run build
          npx vite preview --port 9005 &
          sleep 3

      - name: Run Playwright tests
        working-directory: dryade-workbench
        env:
          BASE_URL: http://localhost:9005
          API_URL: http://localhost:8080
        run: npx playwright test --reporter=github

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: dryade-workbench/playwright-report/
          retention-days: 7
