title: "[Idea] "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: "Share your ideas for improving Dryade! We love hearing from our community."
  - type: textarea
    id: idea
    attributes:
      label: Your Idea
      description: Describe your idea in detail
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this be used? Who benefits?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any mockups, examples, or related projects
