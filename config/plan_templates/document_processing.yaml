name: document_processing
description: Process and extract information from documents
category: data_processing
parameters:
  - name: document_path
    type: string
    required: true
    description: "Path to document to process"
  - name: output_format
    type: string
    required: false
    default: "summary"
    description: "Desired output format (summary, bullet_points, key_facts)"

nodes:
  - id: read_document
    agent: file_reader
    task: "Read document at {document_path}"
    depends_on: []
    expected_output: "Document contents"

  - id: extract_info
    agent: data_analyzer
    task: "Extract key information from document at {document_path}"
    depends_on: ["read_document"]
    expected_output: "Extracted information and entities"

  - id: format_output
    agent: report_generator
    task: "Format extracted information as {output_format} from {document_path}"
    depends_on: ["extract_info"]
    expected_output: "Formatted {output_format}"

edges:
  - source: read_document
    target: extract_info
  - source: extract_info
    target: format_output

metadata:
  estimated_duration_seconds: 45
  cost_estimate_usd: 0.03
