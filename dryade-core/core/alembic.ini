# Alembic configuration for Dryade Core
# Note: env.py overrides sqlalchemy.url from settings.database_url

[alembic]
script_location = core/alembic
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://dryade:dryade@localhost:5432/dryade

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
