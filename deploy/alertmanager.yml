# AlertManager configuration for Dryade compliance monitoring
# SOC 2 requirement: alerting pipeline for anomaly detection
#
# Receiver Configuration Guide:
# =============================
#
# Slack:
#   receivers:
#     - name: 'slack-critical'
#       slack_configs:
#         - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
#           channel: '#dryade-alerts'
#           title: '{{ .GroupLabels.alertname }}'
#           text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
#           send_resolved: true
#
# Email:
#   receivers:
#     - name: 'email-team'
#       email_configs:
#         - to: 'ops-team@example.com'
#           from: 'alertmanager@dryade.ai'
#           smarthost: 'smtp.example.com:587'
#           auth_username: 'alertmanager@example.com'
#           auth_password: '<app-password>'
#           send_resolved: true
#
# PagerDuty:
#   receivers:
#     - name: 'pagerduty-critical'
#       pagerduty_configs:
#         - service_key: '<pagerduty-integration-key>'
#           severity: '{{ .CommonLabels.severity }}'
#           description: '{{ .CommonAnnotations.summary }}'
#           send_resolved: true

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:9095/webhook'  # Template -- replace with actual webhook
        send_resolved: true
  - name: 'critical'
    webhook_configs:
      - url: 'http://localhost:9095/webhook'  # Template -- replace with actual webhook
        send_resolved: true
