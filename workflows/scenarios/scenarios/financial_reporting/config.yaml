name: financial_reporting
display_name: "Quarterly Financial Report Analysis"
description: "Analyze financial reports, extract KPIs, compare to historical data, and generate executive summary"
domain: finance
version: "1.0.0"

triggers:
  chat_command: "/analyze-report"
  api_endpoint: "/workflow-scenarios/financial_reporting/trigger"
  ui_button:
    label: "Analyze Report"
    location: "documents_page"

inputs:
  - name: report_file
    type: file
    required: true
    description: "Quarterly report PDF or Excel file"
  - name: comparison_quarter
    type: string
    required: false
    description: "Previous quarter for comparison (e.g., Q3-2025)"
    default: null

outputs:
  - name: executive_summary
    type: markdown
  - name: kpi_table
    type: json
  - name: trend_analysis
    type: markdown

required_agents:
  - document_processor
  - excel_analyst
  - database_analyst

observability:
  metrics_enabled: true
  log_tool_calls: true
  track_costs: true
